name: Dependency Probe

permissions:
  contents: read

on:
  workflow_dispatch:
  schedule:
    - cron: "23 3 * * 1"

jobs:
  unlocked-windows-x64:
    name: unlocked-windows-x64
    runs-on: windows-2025

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          architecture: x64

      - name: Install current dependency set
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Probe runtime contracts
        shell: pwsh
        run: |
          python -m py_compile main.py
          python scripts/validate_web_contracts.py
          python -m pip check
          python -m playwright install chromium
