name: Build Windows EXE

permissions:
  contents: write

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build-x64:
    name: build-x64
    runs-on: windows-2025

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          architecture: x64

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          if (Test-Path requirements-lock.txt) {
            python -m pip install -r requirements-lock.txt
          } else {
            python -m pip install -r requirements.txt
          }
          python -m pip install pyinstaller

      - name: Validate Python package set
        shell: pwsh
        run: |
          python -m py_compile main.py
          python scripts/validate_web_contracts.py
          python -m pip check
          python -c "import platform, struct; print('machine=', platform.machine()); print('pointer_bits=', struct.calcsize('P') * 8)"

      - name: Install Playwright Chromium
        shell: pwsh
        run: |
          python -m playwright install chromium

      - name: Build EXE with PyInstaller
        shell: pwsh
        run: |
          pyinstaller --onedir --name llm-pool --add-data "requirements.txt;." --add-data ".env.example;." --add-data "examples;examples" --add-data "README.md;." --add-data "dashboard.html;." main.py

      - name: Smoke test frozen app
        shell: pwsh
        run: |
          $port = 19080
          $env:CHANNELS_FILE = Join-Path $env:RUNNER_TEMP "channels-x64.json"
          $exe = Resolve-Path "dist\llm-pool\llm-pool.exe"
          $proc = Start-Process -FilePath $exe -ArgumentList @("--host", "127.0.0.1", "--port", "$port", "--no-open") -PassThru -WindowStyle Hidden
          try {
            $healthy = $false
            for ($i = 0; $i -lt 40; $i++) {
              try {
                $health = Invoke-RestMethod "http://127.0.0.1:$port/health" -TimeoutSec 2
                if ($health.status -eq "ok") {
                  $healthy = $true
                  break
                }
              } catch {
                Start-Sleep -Seconds 1
              }
            }
            if (-not $healthy) { throw "Frozen app did not become healthy." }
            $page = Invoke-WebRequest "http://127.0.0.1:$port/" -TimeoutSec 5
            if ($page.Content -notmatch "LLM Pool Console") { throw "Dashboard HTML smoke failed." }
            if ($page.Content -notmatch "__LLM_POOL_BOOTSTRAP__") { throw "Local admin token bootstrap smoke failed." }
            $match = [regex]::Match($page.Content, 'adminToken:"([^"]+)"')
            if (-not $match.Success) { throw "Could not parse generated admin token from dashboard bootstrap." }
            $token = $match.Groups[1].Value
            $diag = Invoke-RestMethod "http://127.0.0.1:$port/admin/diagnostics" -Headers @{"X-Admin-Token" = $token} -TimeoutSec 5
            if (-not $diag.runtime -or -not $diag.security -or -not $diag.events) { throw "Diagnostics smoke failed." }
          } finally {
            if ($proc -and -not $proc.HasExited) {
              Stop-Process -Id $proc.Id -Force
              $proc.WaitForExit()
            }
          }

      - name: Zip and checksum
        shell: pwsh
        run: |
          $asset = "llm-pool-windows-x64"
          $zip = "dist\$asset.zip"
          Compress-Archive -Path dist\llm-pool -DestinationPath $zip -Force
          $hash = Get-FileHash $zip -Algorithm SHA256
          "$($hash.Hash.ToLowerInvariant())  $asset.zip" | Set-Content -Path "$zip.sha256" -Encoding ascii

      - name: Upload to Release
        if: github.event_name == 'release'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" "dist/llm-pool-windows-x64.zip" "dist/llm-pool-windows-x64.zip.sha256" --clobber

  arm64-compatibility-probe:
    name: arm64-compatibility-probe
    runs-on: windows-11-arm

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ARM64
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          architecture: arm64

      - name: Probe native ARM64 dependency support
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          python -m pip install --upgrade pip
          python -m pip install -r requirements-lock.txt
          $installExit = $LASTEXITCODE
          python -c "import playwright; print('playwright module ok')"
          $importExit = $LASTEXITCODE
          python -m playwright install chromium
          $browserExit = $LASTEXITCODE

          "## Windows ARM64 compatibility probe" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "install exit: $installExit" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "playwright import exit: $importExit" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "chromium install exit: $browserExit" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          if ($installExit -ne 0 -or $importExit -ne 0 -or $browserExit -ne 0) {
            "Native ARM64 package is not published yet because the full native dependency stack is not installable on this runner. Use the x64 package under Windows on Arm emulation." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          } else {
            "Native ARM64 dependencies passed. A real ARM64 package can be enabled after adding the same frozen-exe smoke gate used by x64." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          }
          exit 0
